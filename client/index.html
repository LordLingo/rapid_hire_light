<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Rapid Hire Solutions — The trusted standard in background checks</title>

    <!--
      Brand favicon + social card. URLs intentionally hard-coded here because
      Vite resolves index.html at build time before the JS bundle runs. They
      mirror the constants in shared/brand.ts; the headerLogo / footerLogo /
      brand pin tests guard against drift on the JS side, and the
      `brandHeadMeta.test.ts` spec pins them on the HTML side.
    -->
    <link rel="icon" type="image/x-icon" href="/manus-storage/rhs-favicon_25880e29.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/manus-storage/rhs-icon-192_f56f7cb1.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/manus-storage/rhs-icon-512_4751a040.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/manus-storage/rhs-apple-touch-icon_cc5596e5.png" />
    <meta name="theme-color" content="#1c2a4e" />

    <meta name="description" content="FCRA-certified background screening built for high-volume hiring. 85%+ of checks complete in under 24 hours, with U.S.-based support." />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rapid Hire Solutions — The trusted standard in background checks" />
    <meta property="og:description" content="FCRA-certified background screening built for high-volume hiring. 85%+ of checks complete in under 24 hours, with U.S.-based support." />
    <meta property="og:image" content="/manus-storage/rhs-og-card_22bd2542.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rapid Hire Solutions — The trusted standard in background checks" />
    <meta name="twitter:description" content="FCRA-certified background screening built for high-volume hiring. 85%+ of checks complete in under 24 hours, with U.S.-based support." />
    <meta name="twitter:image" content="/manus-storage/rhs-og-card_22bd2542.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
